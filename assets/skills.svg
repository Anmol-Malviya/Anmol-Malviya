    <circle cx="5" cy="5" r="4" fill="#00ffff" filter="url(#glowCyan)">
      <animate attributeName="r" values="4;5.5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="18" y="10" fill="#00ffff" font-family="'Courier New', monospace" font-size="13" font-weight="bold">React / Next.js</text>
    <text x="340" y="10" fill="#00ffff" font-family="'Courier New', monospace" font-size="13" font-weight="bold" text-anchor="end">92%</text>
    <!-- Track -->
    <rect x="0" y="17" width="340" height="10" rx="5" fill="#001a1a" stroke="#00ffff" stroke-width="0.8" opacity="0.5"/>
    <!-- Fill bar -->
