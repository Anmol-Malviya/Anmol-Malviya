      <animate attributeName="width" values="0;0;279;279" keyTimes="0;0.2;0.35;1" dur="8s" repeatCount="indefinite"/>
    </rect>
    <line x1="85"  y1="17" x2="85"  y2="27" stroke="#000814" stroke-width="1.5"/>
    <line x1="170" y1="17" x2="170" y2="27" stroke="#000814" stroke-width="1.5"/>
    <line x1="255" y1="17" x2="255" y2="27" stroke="#000814" stroke-width="1.5"/>
