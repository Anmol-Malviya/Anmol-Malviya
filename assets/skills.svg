    <line x1="170" y1="17" x2="170" y2="27" stroke="#000814" stroke-width="1.5"/>
    <line x1="255" y1="17" x2="255" y2="27" stroke="#000814" stroke-width="1.5"/>
  </g>

  <!-- Skill 2: Node.js / Express  88% -->
  <g transform="translate(60, 118)">
    <circle cx="5" cy="5" r="4" fill="#ff00ff" filter="url(#glowPink)">
      <animate attributeName="r" values="4;5.5;4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="18" y="10" fill="#ff00ff" font-family="'Courier New', monospace" font-size="13" font-weight="bold">Node.js / Express</text>
    <text x="340" y="10" fill="#ff00ff" font-family="'Courier New', monospace" font-size="13" font-weight="bold" text-anchor="end">88%</text>
    <rect x="0" y="17" width="340" height="10" rx="5" fill="#1a0011" stroke="#ff00ff" stroke-width="0.8" opacity="0.5"/>
    <rect x="0" y="17" width="0" height="10" rx="5" fill="url(#barPink)" filter="url(#glowPink)">
      <animate attributeName="width" values="0;0;299;299" keyTimes="0;0.1;0.25;1" dur="8s" repeatCount="indefinite"/>
    </rect>
