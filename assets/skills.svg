<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient to match the aesthetic -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00020a"/>
      <stop offset="100%" style="stop-color:#050015"/>
    </linearGradient>

    <!-- Neon Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)" rx="10"/>
  <rect width="798" height="398" x="1" y="1" rx="9" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="45" fill="#ffffff" font-family="'Courier New', monospace" font-size="20" text-anchor="middle" font-weight="bold" letter-spacing="4" filter="url(#glowCyan)">> SYSTEM_SKILLS_CALIBRATION_</text>
  <line x1="200" y1="55" x2="600" y2="55" stroke="#00ffff" stroke-width="2" opacity="0.5" filter="url(#glowCyan)"/>

  <g transform="translate(50, 90)">
    <!-- React / Next.js -->
    <g transform="translate(0, 0)">
      <text x="0" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" font-weight="bold">React / Next.js</text>
      <text x="700" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">92%</text>
      <rect x="0" y="10" width="700" height="14" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3" rx="2"/>
      <rect x="2" y="12" width="0" height="10" fill="#00ffff" rx="1" filter="url(#glowCyan)">
        <animate attributeName="width" values="0;0;640;640;0" keyTimes="0; 0.05; 0.2; 0.95; 1" dur="10s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Node.js / Express -->
    <g transform="translate(0, 50)">
      <text x="0" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold">Node.js / Express</text>
      <text x="700" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">88%</text>
      <rect x="0" y="10" width="700" height="14" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.3" rx="2"/>
      <rect x="2" y="12" width="0" height="10" fill="#ff00ff" rx="1" filter="url(#glowPink)">
        <animate attributeName="width" values="0;0;612;612;0" keyTimes="0; 0.1; 0.25; 0.95; 1" dur="10s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- MongoDB / SQL -->
    <g transform="translate(0, 100)">
      <text x="0" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" font-weight="bold">MongoDB / SQL</text>
      <text x="700" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">85%</text>
      <rect x="0" y="10" width="700" height="14" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3" rx="2"/>
      <rect x="2" y="12" width="0" height="10" fill="#00ffff" rx="1" filter="url(#glowCyan)">
        <animate attributeName="width" values="0;0;591;591;0" keyTimes="0; 0.15; 0.3; 0.95; 1" dur="10s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- TypeScript -->
    <g transform="translate(0, 150)">
      <text x="0" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold">TypeScript</text>
      <text x="700" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">82%</text>
      <rect x="0" y="10" width="700" height="14" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.3" rx="2"/>
      <rect x="2" y="12" width="0" height="10" fill="#ff00ff" rx="1" filter="url(#glowPink)">
        <animate attributeName="width" values="0;0;570;570;0" keyTimes="0; 0.2; 0.35; 0.95; 1" dur="10s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Python / Django -->
    <g transform="translate(0, 200)">
      <text x="0" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" font-weight="bold">Python / Django</text>
      <text x="700" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">78%</text>
      <rect x="0" y="10" width="700" height="14" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.3" rx="2"/>
      <rect x="2" y="12" width="0" height="10" fill="#00ffff" rx="1" filter="url(#glowCyan)">
        <animate attributeName="width" values="0;0;542;542;0" keyTimes="0; 0.25; 0.4; 0.95; 1" dur="10s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- UI/UX / Figma -->
    <g transform="translate(0, 250)">
      <text x="0" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold">UI/UX / Figma</text>
      <text x="700" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">80%</text>
      <rect x="0" y="10" width="700" height="14" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.3" rx="2"/>
      <rect x="2" y="12" width="0" height="10" fill="#ff00ff" rx="1" filter="url(#glowPink)">
        <animate attributeName="width" values="0;0;556;556;0" keyTimes="0; 0.3; 0.45; 0.95; 1" dur="10s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
