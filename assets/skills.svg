<svg width="800" height="360" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00020a"/>
      <stop offset="100%" style="stop-color:#050015"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowCyan" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5"   result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPink" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5"   result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowYellow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5"   result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ffff" stroke-width="0.15" opacity="0.2"/>
    </pattern>

    <!-- Bar fill gradients -->
    <linearGradient id="barCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00ffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="barPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#ff00ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff0066;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="barYellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#ffff00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00cc66;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" fill="url(#bgGrad)" rx="10"/>
  <rect width="800" height="360" fill="url(#grid)"   rx="10"/>
  <!-- Outer neon border -->
  <rect width="798" height="358" x="1" y="1" rx="9" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.5" filter="url(#glowCyan)"/>

  <!-- ── Title ── -->
  <text x="400" y="36" fill="#ffffff" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" font-weight="bold" letter-spacing="5" filter="url(#glowCyan)">&gt; SYSTEM_SKILLS_CALIBRATION_</text>
  <!-- Blinking cursor -->
  <rect x="612" y="20" width="9" height="17" fill="#00ffff" filter="url(#glowCyan)">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  <line x1="60" y1="48" x2="740" y2="48" stroke="#00ffff" stroke-width="1" opacity="0.4"/>

  <!-- ───────────── LEFT COLUMN (x=60) ───────────── -->

  <!-- Skill 1: React / Next.js  92% -->
  <g transform="translate(60, 68)">
