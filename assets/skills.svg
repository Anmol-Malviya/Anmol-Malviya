    </rect>
    <line x1="71"  y1="17" x2="71"  y2="27" stroke="#000814" stroke-width="1.5"/>
    <line x1="142" y1="17" x2="142" y2="27" stroke="#000814" stroke-width="1.5"/>
    <line x1="214" y1="17" x2="214" y2="27" stroke="#000814" stroke-width="1.5"/>
  </g>

