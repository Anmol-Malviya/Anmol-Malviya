<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00020a"/>
      <stop offset="100%" style="stop-color:#050015"/>
    </linearGradient>

    <!-- Neon Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowYellow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="240" fill="url(#bgGrad)" rx="10"/>
  <rect width="798" height="238" x="1" y="1" rx="9" fill="none" stroke="#ffff00" stroke-width="1" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="35" fill="#ffffff" font-family="'Courier New', monospace" font-size="20" text-anchor="middle" font-weight="bold" letter-spacing="4" filter="url(#glowYellow)">> ACHIEVEMENT_UNLOCKS_</text>
  <line x1="250" y1="45" x2="550" y2="45" stroke="#00ffff" stroke-width="2" opacity="0.5" filter="url(#glowCyan)"/>

  <!-- Badges Container -->
  <g transform="translate(0, 120)">
    
    <!-- 1. Multi-Language -->
    <g transform="translate(110, 0)">
      <!-- Outer Rotating Ring -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="15s" repeatCount="indefinite"/>
        <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="8 6" filter="url(#glowYellow)" opacity="0.7"/>
      </g>
      <!-- Inner Hexagon -->
      <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="#111100" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)"/>
      <!-- Icon -->
      <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="-4,-8 -12,0 -4,8" />
        <polyline points="4,-8 12,0 4,8" />
      </g>
      <!-- Text -->
      <text x="0" y="60" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" font-weight="bold">POLYGLOT</text>
      <text x="0" y="80" fill="#ffff00" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glowYellow)">S-RANK</text>
    </g>

    <!-- 2. Stars -->
    <g transform="translate(226, 0)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="360;0" dur="12s" repeatCount="indefinite"/>
        <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="8 6" filter="url(#glowPink)" opacity="0.7"/>
      </g>
      <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="#110011" stroke="#ff00ff" stroke-width="2" filter="url(#glowPink)"/>
      <polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4" fill="#ffffff"/>
      <text x="0" y="60" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" font-weight="bold">STARGAZER</text>
      <text x="0" y="80" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glowPink)">A-RANK</text>
    </g>

    <!-- 3. Commits -->
    <g transform="translate(342, 0)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
        <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="8 6" filter="url(#glowCyan)" opacity="0.7"/>
      </g>
      <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="#001111" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="0" y1="-14" x2="0" y2="-5" stroke="#ffffff" stroke-width="2"/>
      <line x1="0" y1="5" x2="0" y2="14" stroke="#ffffff" stroke-width="2"/>
      <text x="0" y="60" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" font-weight="bold">COMMITS</text>
      <text x="0" y="80" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glowCyan)">S-RANK</text>
    </g>

    <!-- 4. Repositories -->
    <g transform="translate(458, 0)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="360;0" dur="14s" repeatCount="indefinite"/>
        <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#ffff00" stroke-width="1.5" stroke-dasharray="8 6" filter="url(#glowYellow)" opacity="0.7"/>
      </g>
      <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="#111100" stroke="#ffff00" stroke-width="2" filter="url(#glowYellow)"/>
      <rect x="-8" y="-10" width="16" height="20" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#ffffff" stroke-width="2"/>
      <text x="0" y="60" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" font-weight="bold">REPOSITORIES</text>
      <text x="0" y="80" fill="#ffff00" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glowYellow)">A-RANK</text>
    </g>

    <!-- 5. Followers -->
    <g transform="translate(574, 0)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="16s" repeatCount="indefinite"/>
        <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="8 6" filter="url(#glowPink)" opacity="0.7"/>
      </g>
      <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="#110011" stroke="#ff00ff" stroke-width="2" filter="url(#glowPink)"/>
      <circle cx="0" cy="-4" r="4" fill="none" stroke="#ffffff" stroke-width="2"/>
      <path d="M -9 12 C -9 4, 9 4, 9 12" fill="none" stroke="#ffffff" stroke-width="2"/>
      <text x="0" y="60" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" font-weight="bold">FOLLOWERS</text>
      <text x="0" y="80" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glowPink)">B-RANK</text>
    </g>

    <!-- 6. Pull Requests -->
    <g transform="translate(690, 0)">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="360;0" dur="11s" repeatCount="indefinite"/>
        <polygon points="0,-40 34.6,-20 34.6,20 0,40 -34.6,20 -34.6,-20" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="8 6" filter="url(#glowCyan)" opacity="0.7"/>
      </g>
      <polygon points="0,-32 27.7,-16 27.7,16 0,32 -27.7,16 -27.7,-16" fill="#001111" stroke="#00ffff" stroke-width="2" filter="url(#glowCyan)"/>
      <circle cx="-5" cy="8" r="2.5" fill="#ffffff"/>
      <circle cx="5" cy="-8" r="2.5" fill="#ffffff"/>
      <path d="M -5 5 L -5 -5 C -5 -9, 5 -3, 5 -5" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <text x="0" y="60" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" text-anchor="middle" font-weight="bold">PULL REQUESTS</text>
      <text x="0" y="80" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glowCyan)">A-RANK</text>
    </g>
  </g>
</svg>
