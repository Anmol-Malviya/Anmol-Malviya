<svg width="800" height="480" viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00020a"/>
      <stop offset="100%" style="stop-color:#050015"/>
    </linearGradient>

    <!-- Universal Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Pattern -->
    <pattern id="scanlines" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="800" y2="0" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
    </pattern>

    <!-- Floating Animation Definition -->
    <g id="float">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="4s" repeatCount="indefinite" />
    </g>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" rx="10"/>
  <rect width="800" height="480" fill="url(#scanlines)" rx="10"/>
  <rect width="798" height="478" x="1" y="1" rx="9" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2"/>

  <!-- Main Title -->
  <text x="400" y="35" fill="#ffffff" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" font-weight="bold" letter-spacing="4" filter="url(#glow)">> CORE_TECHNOLOGY_STACK_</text>
  <line x1="250" y1="45" x2="550" y2="45" stroke="#ff00ff" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>


  <!-- ================= FRONTEND ================= -->
  <g transform="translate(0, 80)">
    <text x="400" y="0" fill="#00ffff" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.8">🚀 FRONTEND_MODULES</text>
    <line x1="320" y1="8" x2="480" y2="8" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
    
    <!-- React -->
    <g transform="translate(40, 25)">
      <animateTransform attributeName="transform" type="translate" values="40,25; 40,22; 40,25" dur="3.1s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#61DAFB" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#61DAFB" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">React</text>
      </g>
    </g>
    <!-- Next.js -->
    <g transform="translate(160, 25)">
      <animateTransform attributeName="transform" type="translate" values="160,25; 160,22; 160,25" dur="3.5s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#ffffff" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Next.js</text>
      </g>
    </g>
    <!-- TypeScript -->
    <g transform="translate(280, 25)">
      <animateTransform attributeName="transform" type="translate" values="280,25; 280,22; 280,25" dur="2.8s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#3178C6" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#3178C6" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">TypeScript</text>
      </g>
    </g>
    <!-- JavaScript -->
    <g transform="translate(400, 25)">
      <animateTransform attributeName="transform" type="translate" values="400,25; 400,22; 400,25" dur="3.3s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#F7DF1E" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#F7DF1E" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">JavaScript</text>
      </g>
    </g>
    <!-- Tailwind -->
    <g transform="translate(520, 25)">
      <animateTransform attributeName="transform" type="translate" values="520,25; 520,22; 520,25" dur="3.7s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#38B2AC" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#38B2AC" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Tailwind</text>
      </g>
    </g>
    <!-- GSAP -->
    <g transform="translate(640, 25)">
      <animateTransform attributeName="transform" type="translate" values="640,25; 640,22; 640,25" dur="2.9s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#88CE02" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#88CE02" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">GSAP</text>
      </g>
    </g>
  </g>


  <!-- ================= BACKEND ================= -->
  <g transform="translate(0, 180)">
    <text x="400" y="0" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.8">⚙️ BACKEND_SYSTEMS</text>
    <line x1="320" y1="8" x2="480" y2="8" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>
    
    <!-- Node.js -->
    <g transform="translate(100, 25)">
      <animateTransform attributeName="transform" type="translate" values="100,25; 100,22; 100,25" dur="3.4s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#339933" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#339933" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Node.js</text>
      </g>
    </g>
    <!-- Express.js -->
    <g transform="translate(220, 25)">
      <animateTransform attributeName="transform" type="translate" values="220,25; 220,22; 220,25" dur="3.0s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#888888" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#888888" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Express.js</text>
      </g>
    </g>
    <!-- Python -->
    <g transform="translate(340, 25)">
      <animateTransform attributeName="transform" type="translate" values="340,25; 340,22; 340,25" dur="3.6s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#3776AB" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#3776AB" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Python</text>
      </g>
    </g>
    <!-- Django -->
    <g transform="translate(460, 25)">
      <animateTransform attributeName="transform" type="translate" values="460,25; 460,22; 460,25" dur="2.7s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#092E20" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#00ffaa" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Django</text>
      </g>
    </g>
    <!-- PHP -->
    <g transform="translate(580, 25)">
      <animateTransform attributeName="transform" type="translate" values="580,25; 580,22; 580,25" dur="3.2s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#777BB4" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#777BB4" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">PHP</text>
      </g>
    </g>
  </g>


  <!-- ================= DATABASES & CLOUD ================= -->
  <g transform="translate(0, 280)">
    <text x="400" y="0" fill="#ffff00" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.8">🗄️ DATA_&amp;_CLOUD</text>
    <line x1="320" y1="8" x2="480" y2="8" stroke="#ffff00" stroke-width="1" opacity="0.3"/>
    
    <!-- MongoDB -->
    <g transform="translate(100, 25)">
      <animateTransform attributeName="transform" type="translate" values="100,25; 100,22; 100,25" dur="3.5s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#47A248" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#47A248" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">MongoDB</text>
      </g>
    </g>
    <!-- MySQL -->
    <g transform="translate(220, 25)">
      <animateTransform attributeName="transform" type="translate" values="220,25; 220,22; 220,25" dur="2.9s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#4479A1" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#4479A1" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">MySQL</text>
      </g>
    </g>
    <!-- PostgreSQL -->
    <g transform="translate(340, 25)">
      <animateTransform attributeName="transform" type="translate" values="340,25; 340,22; 340,25" dur="3.3s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#4169E1" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#4169E1" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">PostgreSQL</text>
      </g>
    </g>
    <!-- AWS -->
    <g transform="translate(460, 25)">
      <animateTransform attributeName="transform" type="translate" values="460,25; 460,22; 460,25" dur="3.7s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#FF9900" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#FF9900" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">AWS</text>
      </g>
    </g>
    <!-- Vercel -->
    <g transform="translate(580, 25)">
      <animateTransform attributeName="transform" type="translate" values="580,25; 580,22; 580,25" dur="2.8s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#ffffff" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Vercel</text>
      </g>
    </g>
  </g>


  <!-- ================= TOOLS ================= -->
  <g transform="translate(0, 380)">
    <text x="400" y="0" fill="#00ff88" font-family="'Courier New', monospace" font-size="14" text-anchor="middle" font-weight="bold" letter-spacing="2" opacity="0.8">🛠️ DEVELOPMENT_TOOLS</text>
    <line x1="320" y1="8" x2="480" y2="8" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
    
    <!-- Git -->
    <g transform="translate(100, 25)">
      <animateTransform attributeName="transform" type="translate" values="100,25; 100,22; 100,25" dur="3.1s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#F05032" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#F05032" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Git</text>
      </g>
    </g>
    <!-- VS Code -->
    <g transform="translate(220, 25)">
      <animateTransform attributeName="transform" type="translate" values="220,25; 220,22; 220,25" dur="3.5s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#007ACC" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#007ACC" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">VS Code</text>
      </g>
    </g>
    <!-- Figma -->
    <g transform="translate(340, 25)">
      <animateTransform attributeName="transform" type="translate" values="340,25; 340,22; 340,25" dur="2.7s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#F24E1E" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#F24E1E" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Figma</text>
      </g>
    </g>
    <!-- Postman -->
    <g transform="translate(460, 25)">
      <animateTransform attributeName="transform" type="translate" values="460,25; 460,22; 460,25" dur="3.4s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#FF6C37" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#FF6C37" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Postman</text>
      </g>
    </g>
    <!-- Docker -->
    <g transform="translate(580, 25)">
      <animateTransform attributeName="transform" type="translate" values="580,25; 580,22; 580,25" dur="3.0s" repeatCount="indefinite"/>
      <g filter="url(#glow)">
        <rect width="105" height="26" rx="13" fill="#000814" stroke="#2496ED" stroke-width="1.5"/>
        <text x="52.5" y="17" fill="#2496ED" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">Docker</text>
