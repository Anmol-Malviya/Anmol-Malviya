<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Glow Filters -->
  <filter id="neonCyan" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="b1"/>
    <feGaussianBlur stdDeviation="6" result="b2"/>
    <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="neonPink" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="b1"/>
    <feGaussianBlur stdDeviation="6" result="b2"/>
    <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="neonYellow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="b1"/>
    <feGaussianBlur stdDeviation="6" result="b2"/>
    <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Gradients -->
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#00020a"/>
    <stop offset="50%" style="stop-color:#1a0033"/>
    <stop offset="100%" style="stop-color:#000000"/>
  </linearGradient>
  <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#ffff00"/>
    <stop offset="50%" style="stop-color:#ff00ff"/>
    <stop offset="100%" style="stop-color:#4d0099"/>
  </linearGradient>
  <linearGradient id="shipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#ffffff"/>
    <stop offset="100%" style="stop-color:#00ffff"/>
  </linearGradient>

  <!-- Sun Cutout -->
  <clipPath id="sunCutout">
    <rect x="0" y="0" width="800" height="205"/>
    <rect x="0" y="210" width="800" height="4"/>
    <rect x="0" y="218" width="800" height="6"/>
    <rect x="0" y="228" width="800" height="8"/>
    <rect x="0" y="240" width="800" height="12"/>
  </clipPath>

  <!-- Shield Grid Pattern -->
  <pattern id="gridPattern" width="8" height="8" patternUnits="userSpaceOnUse">
    <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
  </pattern>
</defs>

<!-- BG -->
<rect width="800" height="420" fill="url(#bgGrad)" rx="10"/>
<rect width="798" height="418" x="1" y="1" rx="9" fill="none" stroke="#00d9ff" stroke-width="1.5">
  <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
</rect>

<!-- Moving Stars (Sky only) -->
<g fill="white">
  <circle cx="40" r="1"><animate attributeName="cy" values="-10;240" dur="2.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="90" r="1.5"><animate attributeName="cy" values="-20;240" dur="3.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="160" r="1"><animate attributeName="cy" values="-5;240" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="250" r="1" fill="#aaeeff"><animate attributeName="cy" values="-15;240" dur="2.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="330" r="1.5"><animate attributeName="cy" values="-25;240" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="420" r="1"><animate attributeName="cy" values="-10;240" dur="2.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="500" r="1" fill="#ffaacc"><animate attributeName="cy" values="-30;240" dur="3.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="600" r="1.5"><animate attributeName="cy" values="-15;240" dur="1.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="680" r="1"><animate attributeName="cy" values="-5;240" dur="3.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0" dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="750" r="1"><animate attributeName="cy" values="-20;240" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0" dur="2.6s" repeatCount="indefinite"/></circle>
</g>

<!-- Retro Sun -->
<g filter="url(#neonPink)">
  <circle cx="400" cy="240" r="100" fill="url(#sunGrad)" clip-path="url(#sunCutout)"/>
</g>

<!-- Horizon Line -->
<line x1="0" y1="240" x2="800" y2="240" stroke="#ff00ff" stroke-width="2" filter="url(#neonPink)"/>

<!-- Perspective Animated Grid -->
<g stroke="#ff00ff" stroke-width="1.5" filter="url(#neonPink)" opacity="0.45">
  <!-- Radiating lines -->
  <path d="M400 240 L-400 420 M400 240 L-200 420 M400 240 L0 420 M400 240 L200 420 M400 240 L400 420 M400 240 L600 420 M400 240 L800 420 M400 240 L1000 420 M400 240 L1200 420" />
  
  <!-- Moving horizontal lines -->
  <path><animate attributeName="d" values="M0 240 H800; M0 245 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 245 H800; M0 255 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 255 H800; M0 270 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 270 H800; M0 290 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 290 H800; M0 320 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 320 H800; M0 360 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 360 H800; M0 420 H800" dur="0.8s" repeatCount="indefinite"/></path>
  <path><animate attributeName="d" values="M0 420 H800; M0 500 H800" dur="0.8s" repeatCount="indefinite"/></path>
</g>

<!-- HUD -->
<text x="20" y="30" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" font-weight="bold" filter="url(#neonPink)">SCORE</text>
<text x="20" y="55" fill="#ffffff" font-family="'Courier New', monospace" font-size="22" font-weight="bold" filter="url(#neonCyan)">01550</text>

<text x="400" y="35" fill="#ffff00" font-family="'Courier New', monospace" font-size="18" text-anchor="middle" font-weight="bold" letter-spacing="4" filter="url(#neonYellow)">NEON INVADERS</text>

<text x="780" y="30" fill="#ff00ff" font-family="'Courier New', monospace" font-size="14" text-anchor="end" font-weight="bold" filter="url(#neonPink)">LIVES</text>
<g transform="translate(720, 45)" filter="url(#neonCyan)">
  <polygon points="0,0 10,-10 20,0 10,10" fill="#00ffff"/>
  <polygon points="25,0 35,-10 45,0 35,10" fill="#00ffff"/>
  <polygon points="50,0 60,-10 70,0 60,10" fill="#00ffff"/>
</g>

<!-- ENEMY FLEET -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;120,0;120,0;0,0;-120,0;-120,0;0,0" keyTimes="0;0.2;0.35;0.5;0.7;0.85;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  
  <!-- Hover Bobbing -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,-5; 0,5; 0,-5" dur="3s" repeatCount="indefinite" />
    
    <!-- Row 1 - Yellow Triangles -->
    <g fill="none" stroke="#ffff00" stroke-width="2" filter="url(#neonYellow)">
      <g transform="translate(160,80)"><polygon points="0,-12 14,10 -14,10"/><circle cx="0" cy="2" r="3" fill="#ffff00"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0s" repeatCount="indefinite"/></g>
      <g transform="translate(240,80)"><polygon points="0,-12 14,10 -14,10"/><circle cx="0" cy="2" r="3" fill="#ffff00"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></g>
      <g transform="translate(320,80)"><polygon points="0,-12 14,10 -14,10"/><circle cx="0" cy="2" r="3" fill="#ffff00"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></g>
      <g transform="translate(400,80)"><polygon points="0,-12 14,10 -14,10"/><circle cx="0" cy="2" r="3" fill="#ffff00"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/></g>
      <g transform="translate(480,80)"><polygon points="0,-12 14,10 -14,10"/><circle cx="0" cy="2" r="3" fill="#ffff00"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/></g>
      <g transform="translate(560,80)"><polygon points="0,-12 14,10 -14,10"/><circle cx="0" cy="2" r="3" fill="#ffff00"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="1.0s" repeatCount="indefinite"/></g>
    </g>

    <!-- Row 2 - Pink Diamonds -->
    <g fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#neonPink)">
      <g transform="translate(160,130)"><polygon points="0,-12 12,0 0,12 -12,0"/><circle cx="0" cy="0" r="3" fill="#ff00ff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></g>
      <g transform="translate(240,130)"><polygon points="0,-12 12,0 0,12 -12,0"/><circle cx="0" cy="0" r="3" fill="#ff00ff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></g>
      <g transform="translate(320,130)"><polygon points="0,-12 12,0 0,12 -12,0"/><circle cx="0" cy="0" r="3" fill="#ff00ff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/></g>
      <g transform="translate(400,130)"><polygon points="0,-12 12,0 0,12 -12,0"/><circle cx="0" cy="0" r="3" fill="#ff00ff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/></g>
      <g transform="translate(480,130)"><polygon points="0,-12 12,0 0,12 -12,0"/><circle cx="0" cy="0" r="3" fill="#ff00ff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="1.0s" repeatCount="indefinite"/></g>
      <g transform="translate(560,130)"><polygon points="0,-12 12,0 0,12 -12,0"/><circle cx="0" cy="0" r="3" fill="#ff00ff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="1.2s" repeatCount="indefinite"/></g>
    </g>

    <!-- Row 3 - Cyan Hexagons -->
    <g fill="none" stroke="#00ffff" stroke-width="2" filter="url(#neonCyan)">
      <g transform="translate(160,180)"><polygon points="-10,-8.6 10,-8.6 15,0 10,8.6 -10,8.6 -15,0"/><circle cx="0" cy="0" r="3" fill="#00ffff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></g>
      <g transform="translate(240,180)"><polygon points="-10,-8.6 10,-8.6 15,0 10,8.6 -10,8.6 -15,0"/><circle cx="0" cy="0" r="3" fill="#00ffff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/></g>
      <g transform="translate(320,180)"><polygon points="-10,-8.6 10,-8.6 15,0 10,8.6 -10,8.6 -15,0"/><circle cx="0" cy="0" r="3" fill="#00ffff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/></g>
      <g transform="translate(400,180)"><polygon points="-10,-8.6 10,-8.6 15,0 10,8.6 -10,8.6 -15,0"/><circle cx="0" cy="0" r="3" fill="#00ffff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="1.0s" repeatCount="indefinite"/></g>
      <g transform="translate(480,180)"><polygon points="-10,-8.6 10,-8.6 15,0 10,8.6 -10,8.6 -15,0"/><circle cx="0" cy="0" r="3" fill="#00ffff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="1.2s" repeatCount="indefinite"/></g>
      <g transform="translate(560,180)"><polygon points="-10,-8.6 10,-8.6 15,0 10,8.6 -10,8.6 -15,0"/><circle cx="0" cy="0" r="3" fill="#00ffff"/><animate attributeName="opacity" values="1;0.5;1" dur="1.2s" begin="1.4s" repeatCount="indefinite"/></g>
    </g>

    <!-- Enemy lasers dropping -->
    <rect x="398" y="195" width="4" height="24" rx="2" fill="#ffffff" filter="url(#neonPink)">
      <animate attributeName="y" values="195;450" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="318" y="195" width="4" height="24" rx="2" fill="#ffffff" filter="url(#neonPink)">
      <animate attributeName="y" values="195;450" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="558" y="195" width="4" height="24" rx="2" fill="#ffffff" filter="url(#neonPink)">
      <animate attributeName="y" values="195;450" dur="2.1s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2.1s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</g>

<!-- Explosions -->
<g transform="translate(320,130)">
  <circle cx="0" cy="0" r="0" fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#neonPink)">
    <animate attributeName="r" values="0;0;60;60" keyTimes="0; 0.3125; 0.4375; 1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0; 0.3125; 0.4375; 1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <text x="0" y="-10" text-anchor="middle" fill="#ffff00" font-family="'Courier New', monospace" font-size="16" font-weight="bold" filter="url(#neonYellow)" opacity="0">
    +100
    <animate attributeName="y" values="-10;-10;-40;-40" keyTimes="0; 0.3125; 0.4375; 1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0; 0.3125; 0.4375; 1" dur="8s" repeatCount="indefinite"/>
  </text>
</g>

<g transform="translate(480,80)">
  <circle cx="0" cy="0" r="0" fill="none" stroke="#00ffff" stroke-width="4" filter="url(#neonCyan)">
    <animate attributeName="r" values="0;0;50;50" keyTimes="0; 0.6875; 0.8125; 1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0; 0.6875; 0.8125; 1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <text x="0" y="-10" text-anchor="middle" fill="#ffff00" font-family="'Courier New', monospace" font-size="16" font-weight="bold" filter="url(#neonYellow)" opacity="0">
    +50
    <animate attributeName="y" values="-10;-10;-40;-40" keyTimes="0; 0.6875; 0.8125; 1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0; 0.6875; 0.8125; 1" dur="8s" repeatCount="indefinite"/>
  </text>
</g>

<!-- Digital Shields -->
<path d="M 120 330 L 140 290 L 200 290 L 220 330 L 200 320 L 140 320 Z" fill="url(#gridPattern)" stroke="#00ffff" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.8"/>
<path d="M 350 330 L 370 290 L 430 290 L 450 330 L 430 320 L 370 320 Z" fill="url(#gridPattern)" stroke="#00ffff" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.8"/>
<path d="M 580 330 L 600 290 L 660 290 L 680 330 L 660 320 L 600 320 Z" fill="url(#gridPattern)" stroke="#00ffff" stroke-width="1.5" filter="url(#neonCyan)" opacity="0.8"/>

<!-- PLAYER SHIP -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;200,0;200,0;0,0;-180,0;-180,0;0,0" keyTimes="0;0.2;0.35;0.5;0.7;0.85;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  
  <!-- Player laser -->
  <rect x="398" y="65" width="4" height="40" rx="2" fill="#ffffff" filter="url(#neonCyan)">
    <animate attributeName="y" values="330;30" dur="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <g filter="url(#neonCyan)">
    <!-- Outer glowing hull -->
    <polygon points="400,320 425,370 400,355 375,370" fill="none" stroke="#00ffff" stroke-width="3"/>
    <!-- Inner bright core -->
    <polygon points="400,335 410,360 400,352 390,360" fill="url(#shipGrad)" />
    <!-- Engine flames -->
    <polygon points="392,360 400,385 408,360" fill="#ff00ff">
      <animate attributeName="points" values="392,360 400,385 408,360; 392,360 400,375 408,360; 392,360 400,385 408,360" dur="0.2s" repeatCount="indefinite"/>
    </polygon>
  </g>
</g>

<!-- Bottom credits -->
<text x="400" y="410" text-anchor="middle" fill="#00ffff" font-family="'Courier New', monospace" font-size="12" letter-spacing="4" font-weight="bold" opacity="0.8">AUTO-PLAY MODE · ANMOL MALVIYA</text>
</svg>
