<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000814"/>
      <stop offset="50%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#000814"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ff6b9d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="12"/>

  <!-- Animated border -->
  <rect width="898" height="218" x="1" y="1" rx="11" fill="none" stroke="#00d9ff" stroke-width="1.5">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="85" cy="60" r="1.5" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="20" r="1" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="45" r="1" fill="#aaeeff"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="30" r="1.5" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="760" cy="55" r="1" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="20" r="1" fill="#ffaacc"><animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="65" r="1.5" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="50" cy="180" r="1" fill="white"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="175" r="1" fill="white"><animate attributeName="opacity" values="1;0.4;1" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="200" r="1.5" fill="#aaeeff"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="195" r="1" fill="white"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.9s" repeatCount="indefinite"/></circle>

  <!-- Circuit lines - horizontal -->
  <line x1="0" y1="110" x2="260" y2="110" stroke="#00d9ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="640" y1="110" x2="900" y2="110" stroke="#00d9ff" stroke-width="0.5" opacity="0.2"/>
  <!-- Circuit nodes -->
  <circle cx="240" cy="110" r="3" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>
  <circle cx="660" cy="110" r="3" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.4"/>

  <!-- Floating particles -->
  <circle cx="270" cy="40" r="3" fill="#00d9ff" opacity="0.6">
    <animate attributeName="cy" values="40;25;40;55;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6;0.3;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="630" cy="60" r="2" fill="#ff6b9d" opacity="0.7">
    <animate attributeName="cy" values="60;45;60;75;60" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7;0.3;0.7" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="200" r="2.5" fill="#00d9ff" opacity="0.5">
    <animate attributeName="cy" values="200;190;200;210;200" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="330" cy="170" r="2" fill="#ffffff" opacity="0.4">
    <animate attributeName="cy" values="170;155;170;185;170" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="570" cy="165" r="2" fill="#ff6b9d" opacity="0.5">
    <animate attributeName="cy" values="165;150;165;180;165" dur="4.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Main glowing title -->
  <text x="450" y="115" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="64" font-weight="900" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="4">
    ANMOL MALVIYA
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="155" text-anchor="middle" font-family="Courier New, monospace" font-size="16" fill="#abb2bf" letter-spacing="5">
    FULL STACK DEVELOPER · UI/UX · OPEN SOURCE
  </text>

  <!-- Animated underline -->
  <rect x="450" y="165" width="0" height="2" rx="1" fill="url(#textGrad)">
    <animate attributeName="width" values="0;400;0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
    <animate attributeName="x" values="450;250;450" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </rect>

  <!-- Corner decorations -->
  <path d="M15,15 L40,15 M15,15 L15,40" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M885,15 L860,15 M885,15 L885,40" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M15,205 L40,205 M15,205 L15,180" stroke="#ff6b9d" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M885,205 L860,205 M885,205 L885,180" stroke="#ff6b9d" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
